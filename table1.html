<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Row span</title>
</head>
<body>
    <center>
    <table border="2px"
    rules="all"
    cellpadding="20px">
        <tr>
            <td rowspan="2">A</td>
            <td>C</td>              
            <td>D</td>
            <td>E</td>
            <td>F</td>
        </tr>
        <tr>
            <td>G</td>
            <td>H</td>
            <td>I</td>
            <td rowspan="3">J</td>
        </tr>
        <tr>
            <td rowspan="2">K</td>
            <td>L</td>
            <td>M</td>
            <td>N</td>
        </tr>
        <tr>
            <td>B</td>
            <td>O</td>
            <td>P</td>
        </tr>
    </table>
    </center>
</body>
</html>
