<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table 5</title>
</head>
<body>
    <center><h1>Container Table</h1></center>
    <center>
        <table  border="2px" cellpadding="10px" style="border: 4px rgb(220, 7, 43) solid;">
            <tr>
                <td>
                    <table  border="2px"  cellpadding="10px" style="border: 4px rgb(201, 227, 31) solid;">
                        <thead>
                            <th colspan="2">Nested Table 1</th>
                        </thead>
                        <thead>
                            <th>Column 1</th>
                            <th>Column 2</th>
                        </thead>
                        <tr>
                            <td>our first table</td>
                            <td>nested within</td>
                        </tr>
                    </table>
                </td>
                <td>
                    <table border="2px"  cellpadding="10px" rules="all"  style="border: 4px rgb(9, 29, 126) solid;">
                        <thead>
                            <th>Nested Table 2</th>
                        </thead>
                        <tr>
                            <td>
                                <ul >
                                <li>List object 1</li>
                                <li>List object 2</li>
                                <li>List object 3</li>
                                </ul>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr>
                <td>
                    <table border="2px" cellpadding="10px" >
                        <thead>
                            <th colspan="2"> Nested Table 3</th>
                        </thead>
                        <tr>
                            <td style="color: blueviolet;"><u>Nested Table</u></td>
                            <td>Demo continued</td>
                        </tr>
                    </table>
                </td>
                <td>
                    <table border="2px" cellpadding="10px" rules="all" style="border: 4px rgb(18, 101, 44) solid;">
                        <tr style=" border: 2px rgb(18, 101, 44) solid;">
                            <th>Nested Table 4</th>
                        </tr>
                        <tr>
                            <td style="background-color: black; color:white; border-radius: 30px;"><center>
                                <h1>HTML</h1>
                            </center></td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </center>
</body>
</html>
