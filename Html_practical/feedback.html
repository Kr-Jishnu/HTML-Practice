<!DOCTYPE html>
<html lang="en">
<head>

<body><center>
    <h1>My feedback form</h1>
</center>
<ul>
     <form action="" method="post">
     <li>
        <label for="">Name</label>
        <input type="text" placeholder="name">
    </li>
    <li>
        <label for="">Email</label>
        <input type="email" placeholder="email">
    </li>
    <li>
        <label for="">Password</label>
        <input type="password" placeholder="password" minlength="6" maxlength="10">
    </li><br>
    <li>Please check all the emotions that apply to you:
        <ul>
            <li><label for="">Anger</label>
                <input type="checkbox">
            </li>
            <li><label for="">Sad</label>
                <input type="checkbox">
            </li>
            <li><label for="">Happy</label>
                <input type="checkbox">
            </li>
            <li><label for="">Ambivalent</label>
                <input type="checkbox">
            </li>
        </ul>
    </li>
    <li>How to satisfied were you with our service ?
        <ul>
            <li><label for="">very satisfied</label>
            <input type="radio" name="1">
            </li>
            <li><label for="">satisfied</label>
            <input type="radio" name="1">
            </li>
            <li><label for="">Don't care</label>
            <input type="radio" name="1">
            </li>
            <li><label for="">dissatisfied</label>
            <input type="radio" name="1">
            </li>
            <li><label for="">very dissatisfied</label>
            <input type="radio" name="1">
            </li>
        </ul>
    </li>
    <li><label for="">
        further comments: 
    </label>
    <textarea name="comment" id="" style="width: 200px; height: 80px;"></textarea>
</li>
<li>
    <label for="">
        Bio photo:
    </label>
    <input type="text">    
    <button style="float:inline;"><img src="../32058.jpg " alt="" style="width: 20px;height: 20px;">choose....</button>
</li>
<li>
    <label for="">Location visited</label>
    <select name="" id="">
        <option value="">kerala</option>
        <option value="">karnataka</option>
        <option value="">telangana</option>
    </select>
</li>
<br><br>
    
<li>
    <button>submit</button>
</li>

    </form>

</ul>
    
</body>
</html>
