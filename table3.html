<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Column span</title>
</head>
<body>
    <table border="2px" cellpadding="10px" >
        <tr>
            <th colspan="3">The Table Title</th>
        </tr>
        <tr>
            <th rowspan="2">First column</th>
            <th colspan="2">Second column</th>
        </tr>
        <tr>
            <th>Sub category A</th>
            <th>Sub category B</th>
        </tr>
        <tr>
            <td>Thing 1</td>
            <td>A1</td>
            <td>B1</td>
        </tr>
        <tr>
            <td>Thing 2</td>
            <td>A3</td>
            <td>B2</td>
        </tr>
    </table>
    <table border="2px" cellpadding="30px">
        <tr>
        <td colspan="2">A</td>
        <td colspan="2">B</td>
        <td colspan="2">C</td>
    </tr>
    <tr>
        <td colspan="3">D</td>
        <td colspan="3">E</td>
    </tr>
    </table>
</body>
</html>
